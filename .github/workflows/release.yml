name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 创建版本号
  increment-version:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'release'))
    name: Increment Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.NEW_VERSION }}
      body: ${{ steps.create-release.outputs.RELEASE_BODY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Increment version
        id: set-version
        run: |
          VERSION=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="v1.0.0"
          fi
          MAJOR=$(echo $VERSION | awk -F. '{print $1}' | sed 's/v//')
          MINOR=$(echo $VERSION | awk -F. '{print $2}')
          PATCH=$(echo $VERSION | awk -F. '{print $3}')
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -gt 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create release body
        id: create-release
        run: |
          # 获取上一个tag（fork 可能没有 tag）
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          # 获取 commit 信息
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"* %s")
            CHANGELOG_LINK="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${{ steps.set-version.outputs.NEW_VERSION }}"
            CHANGELOG_TEXT="**Full Changelog**: [${PREV_TAG}...${{ steps.set-version.outputs.NEW_VERSION }}](${CHANGELOG_LINK})"
          else
            COMMITS=$(git log --pretty=format:"* %s" -n 30)
            CHANGELOG_LINK="https://github.com/${GITHUB_REPOSITORY}/commits/${{ github.ref_name }}"
            CHANGELOG_TEXT="**Commit History**: [View commits](${CHANGELOG_LINK})"
          fi
          # 如果没有commit信息，使用默认消息
          if [ -z "$COMMITS" ]; then
            COMMITS="* Regular update and bug fixes"
          fi
          # 创建release body
          RELEASE_BODY="## What's Changed\n\n${COMMITS}\n\n${CHANGELOG_TEXT}"
          # 将release body转义后输出
          echo "RELEASE_BODY<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set-version.outputs.NEW_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Release ${{ steps.set-version.outputs.NEW_VERSION }}"
          body: ${{ steps.create-release.outputs.RELEASE_BODY }}
          prerelease: false
          draft: false


  build-and-upload:
    name: Build and Upload
    needs: increment-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node: lts/*
            build_cmd: electron:build:linux
            target: linux-amd64
          - os: ubuntu-latest
            node: lts/*
            build_cmd: electron:build:linux-arm64
            target: linux-arm64
          - os: windows-latest
            node: lts/*
            build_cmd: electron:build:win-x64
            target: win
          - os: macos-latest
            node: lts/*
            build_cmd: electron:build:macos
            target: mac
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm' # use cache

      - name: Build
        run: |
          npm run install-all
          npm run build
          npm run ${{ matrix.build_cmd }}

      - name: Rename files - win
        if: runner.os == 'Windows'
        run: |
          $exe = Get-ChildItem -Path "./dist_electron" -Filter "*.exe" | Select-Object -First 1
          $blockmap = Get-ChildItem -Path "./dist_electron" -Filter "*.exe.blockmap" | Select-Object -First 1
          if (-not $exe) { throw "No .exe artifact found in dist_electron" }
          if (-not $blockmap) { throw "No .exe.blockmap artifact found in dist_electron" }
          Move-Item $exe.FullName "./MoeKoe_Music_Setup_${{ needs.increment-version.outputs.version }}_x64.exe"
          Move-Item $blockmap.FullName "./MoeKoe_Music_Setup_${{ needs.increment-version.outputs.version }}_x64.exe.blockmap"
          Move-Item "./dist_electron/latest.yml" "./latest.yml"
      - name: Rename files - mac
        if: runner.os == 'macOS'
        run: |
          mv "./dist_electron/MoeKoe Music-arm64.dmg" "./MoeKoe_Music_${{ needs.increment-version.outputs.version }}-arm64.dmg"
          mv "./dist_electron/MoeKoe Music-x64.dmg" "./MoeKoe_Music_${{ needs.increment-version.outputs.version }}-x64.dmg"
      - name: Rename files - linux
        if: matrix.target == 'linux-amd64'
        run: |
          APPIMAGE=$(find "./dist_electron" -maxdepth 1 -type f -name "*.AppImage" | head -n 1)
          DEB=$(find "./dist_electron" -maxdepth 1 -type f -name "*.deb" | head -n 1)
          mv "$APPIMAGE" "./MoeKoe_Music_${{ needs.increment-version.outputs.version }}.AppImage"
          mv "$DEB" "./MoeKoe_Music_${{ needs.increment-version.outputs.version }}_amd64.deb"

      - name: Rename files - linux arm64
        if: matrix.target == 'linux-arm64'
        run: |
          APPIMAGE=$(find "./dist_electron" -maxdepth 1 -type f -name "*.AppImage" | head -n 1)
          DEB=$(find "./dist_electron" -maxdepth 1 -type f -name "*.deb" | head -n 1)
          mv "$APPIMAGE" "./MoeKoe_Music_${{ needs.increment-version.outputs.version }}-arm64.AppImage"
          mv "$DEB" "./MoeKoe_Music_${{ needs.increment-version.outputs.version }}_arm64.deb"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.increment-version.outputs.version }}
          files: |
            ./MoeKoe_Music_Setup_${{ needs.increment-version.outputs.version }}_x64.exe
            ./MoeKoe_Music_Setup_${{ needs.increment-version.outputs.version }}_x64.exe.blockmap
            ./latest.yml

            ./MoeKoe_Music_${{ needs.increment-version.outputs.version }}-arm64.dmg
            ./MoeKoe_Music_${{ needs.increment-version.outputs.version }}-x64.dmg

            ./MoeKoe_Music_${{ needs.increment-version.outputs.version }}.AppImage
            ./MoeKoe_Music_${{ needs.increment-version.outputs.version }}_amd64.deb
            ./MoeKoe_Music_${{ needs.increment-version.outputs.version }}-arm64.AppImage
            ./MoeKoe_Music_${{ needs.increment-version.outputs.version }}_arm64.deb
